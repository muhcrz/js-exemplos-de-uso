<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Contagem</title>

</head>
<body>
    <!-- Botão de contagem -->
     <button id="myButton">Clique aqui</button>

    <!-- Parágrafo da contagem-->
     <p id="myText">Número da contagem:</p>

    <!-- JS embutido -->
    <script>
        let contador = 0;

    const button = document.getElementById('myButton');
    const texto = document.getElementById('myText');

    // Adiciona um evento de clique ao botão
     button.addEventListener('click',() => {
        contador++;
        texto.textContent = "contador: " + contador;

        if (contador % 2 === 0) {
             texto.style.backgroundColor = "green";
        } else {
            texto.style.backgroundColor = "red";
            }     
      });
     </script>
</body>
</html>
