<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>
  let tempo = 0;
let intervalo = null;

const timer = document.getElementById("timer");
const startButton = document.getElementById("startButton");
const pauseButton = document.getElementById("pauseButton");
const resetButton = document.getElementById("resetButton");
const addButton = document.getElementById("add");

// Iniciar temporizador
startButton.addEventListener("click", () => {
  //Se não tiver iniciado, começar
  if (intervalo === null) {
    intervalo = setInterval(() => {
      tempo++;
      timer.textContent = tempo;
    }, 1000);
  }

  // Adicionar um segundo a cada clique,
  else {
    tempo++;
    timer.textContent = tempo;
  }
});

// Pausar temporizador
pauseButton.addEventListener("click", () => {
  clearInterval(intervalo);
  intervalo = null;
});

// Resetar temporizador
resetButton.addEventListener("click", () => {
  clearInterval(intervalo);
  intervalo = null;
  tempo = 0;
  timer.textContent = tempo;
});


  </script>
</body>
</html>
